<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/code.ico" type="image/x-icon">
    <title>Hallow</title>
</head>
<body>
    <div class="terminal">

        <!-- SOBRE -->
        <div class="linha">
            <p class="prompt">whoami</p>
            <div class="resposta">
                <p>Sou estudante de informática no IFMA.</p>
                <p>Gosto de Python, web dev e criar projetos.</p>
            </div>
        </div>
    <div class="linha">
        <p class="prompt">cat objetivo.txt</p>
        <p class="resposta">Quero estudar fora e virar dev full stack.</p>
    </div>
    <div class="linha">
        <p class="prompt">ls skills</p>
        <p class="resposta">Python HTML CSS Git</p>
    </div>
        <!-- PROJETOS -->
        <div class="linha">
            <p class="prompt">ls projetos</p>
            <div class="resposta">

                <div class="card">
                    <p>📁 Cli-Task-Manager</p>
                    <p>A simple CLI task manager em Python.</p>
                    <a href="https://github.com/Hallow303/Cli-Task-Manager">
                        <button>abrir</button>
                    </a>
                </div>
        </div>
    </div>
    <div class="linha">
        <p class="prompt">send-message</p>
        <div class="resposta">

            <form action="https://formspree.io/f/mojkozgn" method="POST">

                <input type="text" name="nome" placeholder="nome..." required><br><br>
                <textarea name="mensagem" placeholder="mensagem..." required></textarea><br><br>

                <button type="submit">enviar</button>
            </form>

        </div>
    </div>
</body>
</html>
